<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EQStudio — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="wordmark">EQStudio</span>
        <span class="subtitle">Affiliate Portal</span>
      </div>

      <h2 class="login-title">Sign in to your account</h2>
      <p class="login-subtitle">Affiliators: enter username. Admin: enter full email.</p>

      <div class="auth-error" id="loginError"></div>

      <div class="field">
        <label>Username or Email</label>
        <input type="text" id="usernameInput" placeholder="e.g. johndoe"
               autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••"
               autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="signInBtn" onclick="handleSignIn()" style="margin-top:8px;">
        Sign in
      </button>

      <p style="font-size:0.78rem;color:var(--text-tertiary);text-align:center;margin-top:20px;">
        Don't have an account? Contact your admin.
      </p>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    // If input contains @, use as-is (admin full email)
    // If no @, append @eqstudio.internal (affiliator username)
    function resolveEmail(input) {
      const val = input.trim().toLowerCase();
      return val.includes('@') ? val : val + '@eqstudio.internal';
    }

    // Check if already logged in
    window.addEventListener('load', async () => {
      const { data: { user } } = await getSupabase().auth.getUser();
      if (user) redirectUser(user);
    });

    async function handleSignIn() {
      const input    = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn      = document.getElementById('signInBtn');
      const errEl    = document.getElementById('loginError');

      errEl.classList.remove('visible');

      if (!input || !password) {
        errEl.textContent = 'Please enter your username and password.';
        errEl.classList.add('visible');
        return;
      }

      setButtonLoading(btn, true);

      try {
        const email = resolveEmail(input);
        const { data, error } = await getSupabase().auth.signInWithPassword({ email, password });
        if (error) throw error;
        redirectUser(data.user);
      } catch (err) {
        errEl.textContent = 'Incorrect username or password.';
        errEl.classList.add('visible');
        setButtonLoading(btn, false);
      }
    }

    function redirectUser(user) {
      if (!user) return;
      if (user.email === ADMIN_EMAIL) {
        window.location.href = 'pages/admin.html';
      } else {
        window.location.href = 'pages/affiliator.html';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignIn();
    });
  </script>
</body>
</html>
